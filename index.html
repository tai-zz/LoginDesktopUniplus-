<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <base href="https://uniplusweb-acesso.intelidata.inf.br/">

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Uniplus - Acesso</title>

  <script
    type="text/javascript"
    src="https://uniplusweb-acesso.intelidata.inf.br/access-web-comp.js">
  </script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      width: 100vw;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      overflow: hidden;
    }

    card-component {
      width: 600px !important;
      max-width: 90vw !important;
      display: block;
      z-index: 2;
    }

    card-component,
    card-component *,
    card-component button,
    card-component input,
    card-component div {
      border-radius: 0 !important;
    }

    .botoes-flutuantes {
      position: fixed;
      right: 25px;
      bottom: 25px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      z-index: 9999;
    }

    .botao-flutuante {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.25);
      transition: all 0.25s ease;
    }

    .botao-flutuante:hover {
      transform: scale(1.08);
    }

    .botao-suporte {
      background: #ffffff;
    }

    .botao-whatsapp {
      background: #22c55e;
    }

    #icone-suporte {
      width: 34px;
      height: 34px;
      object-fit: contain;
      display: block;
    }

    .botao-whatsapp svg {
      width: 30px;
      height: 30px;
      fill: white;
      display: block;
    }
  </style>
</head>

<body>
  <card-component largura="100"></card-component>

  <div class="botoes-flutuantes">
    <button class="botao-flutuante botao-suporte" onclick="baixarSuporte()" title="Acesso Remoto">
      <img id="icone-suporte" alt="Suporte">
    </button>

    <button class="botao-flutuante botao-whatsapp" onclick="abrirWhatsApp()" title="WhatsApp">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 3.5A11.8 11.8 0 0 0 12 .5a11.5 11.5 0 0 0-9.9 17.3L.5 23.5l5.9-1.5A11.5 11.5 0 1 0 20 3.5zM12 21a9 9 0 0 1-4.6-1.3l-.3-.2-3.5.9.9-3.4-.2-.3A9 9 0 1 1 12 21zm4.9-6.7c-.3-.2-1.8-.9-2-.9s-.4-.2-.6.2-.7.9-.9 1.1-.3.2-.6.1a7.3 7.3 0 0 1-2.1-1.3 8 8 0 0 1-1.5-1.8c-.2-.3 0-.4.1-.6l.4-.5.2-.4c.1-.2 0-.4 0-.5l-.6-1.6c-.2-.4-.3-.3-.5-.3h-.4a.8.8 0 0 0-.6.3 2.5 2.5 0 0 0-.8 1.9 4.4 4.4 0 0 0 .9 2.4 10.2 10.2 0 0 0 3.9 3.4c.5.2 1 .3 1.3.4a3 3 0 0 0 1.4.1c.4-.1 1.3-.5 1.5-1 .2-.4.2-.9.1-1-.1-.1-.3-.2-.6-.4z"/>
      </svg>
    </button>
  </div>

  <script>
    const bgLocal = new URL("./fundo-uniplus.png", window.location.href).href;
    document.body.style.backgroundImage = `url('${bgLocal}')`;

    document.getElementById("icone-suporte").src =
      new URL("./suporte.png", window.location.href).href;

    function baixarSuporte() {
      window.open(
        "https://www.boldtsoft.com.br/acessoremoto/BoldTSofT_Sistemas.exe",
        "_blank"
      );
    }

    function abrirWhatsApp() {
      window.open(
        "https://wa.me/5527998051338?text=Olá%20preciso%20de%20suporte%20no%20Uniplus",
        "_blank"
      );
    }
  </script>
</body>
</html>
